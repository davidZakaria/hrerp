# Nginx default server block - copy this to /etc/nginx/sites-available/default
# Replace the entire server { } block with this content

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;
    index index.html index.htm index.nginx-debian.html;
    server_name _;

    # ZKTeco ADMS - proxy /iclock to Node.js backend
    location /iclock {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default: serve static files, then 404
    location / {
        try_files $uri $uri/ =404;
    }
}
